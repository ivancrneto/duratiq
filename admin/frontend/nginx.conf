server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + health to the backend service (same-origin from the browser's
    # view, so no CORS needed in the Docker setup).
    location /api/ {
        proxy_pass http://backend:8080;
    }
    location /health {
        proxy_pass http://backend:8080;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
