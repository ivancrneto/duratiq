# Alembic configuration for duratiq.
#
# The migrations ship inside the package (src/duratiq/migrations) so they travel
# with an installed copy. Point alembic here with `-c alembic.ini`, or set
# `DURATIQ_DATABASE_URL` to override the URL below without editing this file.
[alembic]
script_location = src/duratiq/migrations
prepend_sys_path = src
path_separator = os
# Overridden by the DURATIQ_DATABASE_URL env var when set (see migrations/env.py).
sqlalchemy.url = sqlite:///duratiq.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
