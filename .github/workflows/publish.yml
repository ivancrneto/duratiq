name: publish

# Publishes to PyPI via trusted publishing (OIDC) when a GitHub Release is
# published. No API tokens are stored: PyPI is configured to trust this
# repository's `publish.yml` workflow running in the `pypi` environment.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI Project Name : duratiq
#   Owner             : ivancrneto
#   Repository name   : duratiq
#   Workflow name     : publish.yml
#   Environment name  : pypi
#
# To cut a release: tag v<version> matching pyproject's version, then publish a
# GitHub Release for that tag. This workflow builds the sdist+wheel and uploads.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata (PyPI render)
        run: python -m twine check dist/*

      - name: Verify the release tag matches the package version
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "release tag '$GITHUB_REF_NAME' does not match pyproject version '$version'"; exit 1
          fi
          echo "version $version matches tag $GITHUB_REF_NAME"

      - name: Verify the wheel ships its data files
        run: |
          wheel=$(ls dist/*.whl)
          contents=$(python -m zipfile -l "$wheel")
          for f in duratiq/py.typed duratiq/migrations/script.py.mako; do
            echo "$contents" | grep -q "$f" || { echo "missing from wheel: $f"; exit 1; }
          done
          echo "wheel contents OK"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/duratiq
    permissions:
      id-token: write # OIDC token for trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
