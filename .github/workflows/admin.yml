name: admin

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install duratiq + the admin backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .                  # duratiq (satisfies the admin's dep)
          python -m pip install -e "./admin/backend[dev]"

      - name: Run admin backend tests
        run: pytest -v
        working-directory: admin/backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin/frontend

      - name: Typecheck and build
        run: npm run build
        working-directory: admin/frontend
