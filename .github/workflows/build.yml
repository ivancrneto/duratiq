name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata (PyPI render)
        run: python -m twine check dist/*

      - name: Verify the wheel ships its data files
        run: |
          wheel=$(ls dist/*.whl)
          contents=$(python -m zipfile -l "$wheel")
          for f in duratiq/py.typed duratiq/migrations/script.py.mako; do
            echo "$contents" | grep -q "$f" || { echo "missing from wheel: $f"; exit 1; }
          done
          echo "wheel contents OK"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
